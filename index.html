<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Wing Tactical AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #15151a;
            --neon-blue: #00e5ff;
            --neon-red: #ff2a2a;
            --text-main: #e0e0e0;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Fonte com visual de terminal */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .header {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.1);
        }

        .header h1 {
            font-size: 1.2rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard {
            width: 100%;
            max-width: 400px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .section-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Seletor de Nave */
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        /* Grid de Radar */
        .radar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 25px;
        }

        .btn-radar {
            background: #111;
            border: 1px solid #444;
            color: #888;
            padding: 15px 0;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-radar.center-ia {
            background: #222;
            color: var(--neon-red);
            border-color: var(--neon-red);
            cursor: default;
            font-size: 0.8rem;
        }

        .btn-radar:hover:not(.center-ia) {
            background: #222;
        }

        .btn-radar.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        /* Botões de Alcance */
        .range-container {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
        }

        .btn-range {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            color: #888;
            padding: 12px 0;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-range.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        /* Checkbox Estresse */
        .stress-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255, 42, 42, 0.05);
            padding: 10px;
            border: 1px dashed var(--neon-red);
            border-radius: 4px;
            cursor: pointer;
        }

        .stress-box input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--neon-red);
        }

        .stress-box label {
            color: var(--neon-red);
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Botão Principal */
        .btn-process {
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            transition: transform 0.1s;
        }

        .btn-process:active {
            transform: scale(0.98);
        }

        /* Área de Resultado */
        .result-panel {
            margin-top: 20px;
            background: #000;
            border-left: 4px solid var(--neon-blue);
            padding: 15px;
            border-radius: 0 4px 4px 0;
            min-height: 80px;
        }

        .result-row {
            margin-bottom: 10px;
        }

        .result-label {
            color: #888;
            font-size: 0.8rem;
        }

        .result-value {
            display: block;
            font-size: 1.1rem;
            color: var(--neon-blue);
            font-weight: bold;
            margin-top: 3px;
        }

        .result-value.red {
            color: var(--neon-red);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>IA de Combate: Resistência</h1>
    </div>

    <div class="dashboard">
        <div class="section-label">Unidade Inimiga Ativa</div>
        <select id="shipSelect">
            <option value="t70">T-70 X-Wing (Agressivo)</option>
            <option value="bomber">MG-100 Bomber (Bombardeiro)</option>
            <option value="kwing">K-Wing (Suporte/SLAM)</option>
        </select>

        <div class="section-label">Sua Posição (Império) no Radar</div>
        <div class="radar-grid" id="radarGrid">
            <button class="btn-radar" onclick="setPos('NW', this)">NW</button>
            <button class="btn-radar active" onclick="setPos('N', this)">N (Frente)</button>
            <button class="btn-radar" onclick="setPos('NE', this)">NE</button>
            
            <button class="btn-radar" onclick="setPos('W', this)">W</button>
            <button class="btn-radar center-ia">IA</button>
            <button class="btn-radar" onclick="setPos('E', this)">E</button>
            
            <button class="btn-radar" onclick="setPos('SW', this)">SW</button>
            <button class="btn-radar" onclick="setPos('S', this)">S (Atrás)</button>
            <button class="btn-radar" onclick="setPos('SE', this)">SE</button>
        </div>

        <div class="section-label">Distância do Alvo</div>
        <div class="range-container" id="rangeGrid">
            <button class="btn-range" onclick="setDist(1, this)">Alcance 1</button>
            <button class="btn-range active" onclick="setDist(2, this)">Alcance 2</button>
            <button class="btn-range" onclick="setDist(3, this)">Alcance 3</button>
        </div>

        <label class="stress-box">
            <input type="checkbox" id="stressCheck">
            <span>Nave da Resistência está Estressada?</span>
        </label>

        <button class="btn-process" onclick="calculateAI()">PROCESSAR MANOBRA</button>

        <div class="result-panel">
            <div class="result-row">
                <span class="result-label">MANOBRA CALCULADA:</span>
                <span class="result-value" id="outManeuver">Aguardando dados...</span>
            </div>
            <div class="result-row" style="margin-bottom: 0;">
                <span class="result-label">AÇÃO SUGERIDA:</span>
                <span class="result-value" id="outAction">Aguardando dados...</span>
            </div>
        </div>
    </div>

    <script>
        // Estado inicial
        let currentPosition = 'N';
        let currentRange = 2;

        // Funções para atualizar a UI e o estado do Radar
        function setPos(pos, element) {
            currentPosition = pos;
            // Remove a classe active de todos os botões do radar (exceto o centro)
            const buttons = document.querySelectorAll('#radarGrid .btn-radar:not(.center-ia)');
            buttons.forEach(btn => btn.classList.remove('active'));
            // Adiciona active no botão clicado
            element.classList.add('active');
        }

        // Funções para atualizar a UI e o estado do Alcance
        function setDist(dist, element) {
            currentRange = dist;
            // Remove a classe active de todos os botões de range
            const buttons = document.querySelectorAll('#rangeGrid .btn-range');
            buttons.forEach(btn => btn.classList.remove('active'));
            // Adiciona active no botão clicado
            element.classList.add('active');
        }

// O Motor de Lógica
        function calculateAI() {
            const ship = document.getElementById('shipSelect').value;
            const isStressed = document.getElementById('stressCheck').checked;
            
            let maneuver = "";
            let action = "";

            const posFront = ['NW', 'N', 'NE'];
            const posBehind = ['SW', 'S', 'SE'];
            const posSide = ['W', 'E'];

            // Lógica Baseada na Nave Selecionada
            if (ship === 't70') {
                if (posFront.includes(currentPosition)) {
                    maneuver = (currentRange === 1) ? "Curva Fechada 2" : "Frente 3";
                    
                    // DECISÃO DEFINITIVA: 
                    // Alcance 1 = Foco (Mitigação de dano prioritária)
                    // Alcance 2 ou 3 = Mira (Ataque otimizado)
                    action = (currentRange === 1) ? "Foco" : "Mira (Target Lock)";
                    
                } else if (posBehind.includes(currentPosition)) {
                    maneuver = "Talon Roll 3 (Manobra Vermelha)";
                    action = "Nenhuma (Estressada após a manobra)";
                } else {
                    maneuver = "Curva Leve 2 (Bank)";
                    action = "Impulso (Boost) para ajuste de arco";
                }
            } 
            else if (ship === 'bomber') {
                if (currentRange === 1) {
                    maneuver = "Frente 1";
                    action = "Soltar Bomba / Minas";
                } else {
                    maneuver = "Curva Leve 2";
                    action = "Foco";
                }
            } 
            else if (ship === 'kwing') {
                if (currentRange === 1) {
                    maneuver = "Manobra SLAM (Fuga)";
                    action = "Nenhuma (Efeito do SLAM)";
                } else {
                    maneuver = "Frente 2";
                    action = "Mira (Target Lock)";
                }
            }

            // Override de Estresse (Substitui a lógica normal se já começou o turno estressada)
            if (isStressed) {
                maneuver = "[MANOBRA VERDE] " + maneuver.split('(')[0]; 
                action = "Nenhuma (Estressada previamente)";
            }

            // Atualização da Interface
            const outManeuver = document.getElementById('outManeuver');
            const outAction = document.getElementById('outAction');

            outManeuver.textContent = maneuver;
            outAction.textContent = action;

            // Formatação de cor para ações bloqueadas
            if (isStressed || action.includes("Nenhuma")) {
                outAction.classList.add('red');
            } else {
                outAction.classList.remove('red');
            }
        }
        
        // Registro do Service Worker (Mantém o PWA funcionando)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker não registrado (Normal se não estiver rodando em servidor local/https)');
            });
        }
    </script>
</body>
</html>
