<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Wing Tactical AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root {
            --glow: #00d4ff;
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--glow);
            border-bottom: 2px solid var(--glow);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--panel);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .section-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 1rem;
        }

        .radar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .radar-grid button {
            margin: 0;
            padding: 15px 0;
            background: #222;
            font-weight: bold;
        }

        .radar-grid button.active {
            background: var(--glow);
            color: black;
            border-color: white;
        }

        .ia-center {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border: 1px dashed var(--glow);
            font-size: 0.7rem;
            color: var(--glow);
        }

        .dist-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dist-row button {
            flex: 1;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .btn-main {
            background: var(--glow);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .result-box {
            background: #000;
            border: 1px solid var(--glow);
            padding: 15px;
            border-radius: 5px;
            min-height: 80px;
            font-family: 'Courier New', Courier, monospace;
        }

        .highlight { color: var(--glow); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Tactical HUD: Resistência</h1>

    <div class="container">
        <p class="section-title">Inimigo Ativo</p>
        <select id="shipSelect">
            <option value="t70">T-70 X-Wing (Poe Dameron)</option>
            <option value="bomber">MG-100 StarFortress (Bomber)</option>
            <option value="kwing">K-Wing (Esege Tuketu)</option>
        </select>

        <p class="section-title">Posição do Império (Relativa à IA)</p>
        <div class="radar-grid" id="radar">
            <button onclick="selectPos(this, 'NW')">NW</button>
            <button onclick="selectPos(this, 'N')">N</button>
            <button onclick="selectPos(this, 'NE')">NE</button>
            <button onclick="selectPos(this, 'W')">W</button>
            <div class="ia-center">RESIST.</div>
            <button onclick="selectPos(this, 'E')">E</button>
            <button onclick="selectPos(this, 'SW')">SW</button>
            <button onclick="selectPos(this, 'S')">S</button>
            <button onclick="selectPos(this, 'SE')">SE</button>
        </div>

        <p class="section-title">Alcance (Range)</p>
        <div class="dist-row" id="dist">
            <button onclick="selectDist(this, 1)">1</button>
            <button onclick="selectDist(this, 2)">2</button>
            <button onclick="selectDist(this, 3)">3</button>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="stressed"> <label for="stressed">Nave da Resistência Estressada?</label>
        </div>

        <button class="btn-main" onclick="processAI()">Processar Manobra</button>

        <div class="result-box" id="output">
            Aguardando dados de telemetria...
        </div>
    </div>

    <script>
        let selectedPos = 'N';
        let selectedDist = 2;

        function selectPos(btn, pos) {
            document.querySelectorAll('#radar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedPos = pos;
        }

        function selectDist(btn, d) {
            document.querySelectorAll('#dist button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedDist = d;
        }

        function processAI() {
            const ship = document.getElementById('shipSelect').value;
            const isStressed = document.getElementById('stressed').checked;
            let maneuver = "";
            let action = "";

            // Lógica por nave
            if (ship === 't70') {
                if (['N', 'NW', 'NE'].includes(selectedPos)) {
                    maneuver = selectedDist === 1 ? "Curva Fechada 2 (Turn)" : "Frente 3 (Straight)";
                    action = "Foco ou Mira";
                } else if (['S', 'SW', 'SE'].includes(selectedPos)) {
                    maneuver = "Talon Roll 3 ou Giro-K 4";
                    action = "Foco";
                } else {
                    maneuver = "Curva Leve 2 (Bank)";
                    action = "Boost para ajuste";
                }
            } else if (ship === 'bomber') {
                maneuver = selectedDist === 1 ? "Frente 1 ou Parada" : "Curva Leve 2";
                action = selectedDist === 1 ? "Soltar Bomba / Minas" : "Foco";
            } else if (ship === 'kwing') {
                if (selectedDist === 1) {
                    maneuver = "Slam (Velocidade 3)";
                    action = "Fuga / Reposicionamento";
                } else {
                    maneuver = "Frente 2";
                    action = "Mira (Target Lock)";
                }
            }

            if (isStressed) action = "Nenhuma (Estressada)";

            document.getElementById('output').innerHTML = `
                MANOBRA: <span class="highlight">${maneuver}</span><br>
                AÇÃO: <span class="highlight">${action}</span>
            `;
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
